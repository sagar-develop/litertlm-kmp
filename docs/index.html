<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NativeLM — private, on-device AI</title>
  <meta name="description" content="NativeLM: a fully on-device AI app for Android. No account, no servers, no telemetry.">
  <style>
    :root {
      --bg: #FAF9F6; --fg: #1C1B1A; --muted: #5f5d59; --accent: #7FA980; --border: #e6e3dc;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1C1B1A; --fg: #ECEAE5; --muted: #a8a59e; --accent: #7FA980; --border: #2e2c2a; }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
      line-height: 1.6;
    }
    main { max-width: 680px; margin: 0 auto; padding: 72px 22px; }
    h1 { font-size: 2.2rem; margin: 0 0 .3em; }
    .tag { color: var(--muted); font-size: 1.05rem; margin: 0 0 2em; }
    a { color: var(--accent); }
    .links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 2em; }
    .links a {
      display: inline-block; padding: 10px 16px; border: 1px solid var(--border);
      border-radius: 8px; text-decoration: none; color: var(--fg);
    }
    footer { margin-top: 3em; color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>
<main>
  <h1>NativeLM</h1>
  <p class="tag">A private, fully on-device AI app for Android. No account, no
  servers, no telemetry — your documents and conversations never leave the device.</p>
  <div class="links">
    <a href="./privacy/">Privacy Policy</a>
    <a href="https://github.com/sagar-develop/litertlm-kmp">Source code (AGPL-3.0)</a>
  </div>
  <footer>Built on the open-source litertlm-kmp on-device LLM engine.</footer>
</main>
</body>
</html>
